<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Single Fee Update</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        // Your Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyABcd8PIcjwIvDqFaLlNHpb8j-TE2Hi9YA",
            authDomain: "thanbeeh-e61d9.firebaseapp.com",
            projectId: "thanbeeh-e61d9",
            storageBucket: "thanbeeh-e61d9.appspot.com",
            messagingSenderId: "1072993385928",
            appId: "1:1072993385928:web:7279146f96c0410dd5d4fd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener("DOMContentLoaded", () => {
            const updateForm = document.getElementById('feeUpdateForm');
            const statusMsg = document.getElementById('statusMsg');

            updateForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const adNumber = document.getElementById('adNumber').value.trim();
                const amount = parseFloat(document.getElementById('amount').value);

                if (!adNumber || isNaN(amount)) {
                    statusMsg.innerHTML = "❌ Please enter a valid Admission Number and Amount.";
                    return;
                }

                statusMsg.innerHTML = "⏳ Updating...";

                try {
                    const docRef = doc(db, "schoolMarks", adNumber);
                    
                    // Updates ONLY the fee field, keeping marks/subjects safe
                    await setDoc(docRef, { fee: amount }, { merge: true });

                    statusMsg.innerHTML = `✅ Success! Fee for <strong>${adNumber}</strong> updated to <strong>${amount}</strong>.`;
                    updateForm.reset();
                } catch (error) {
                    console.error("Update Error:", error);
                    statusMsg.innerHTML = "❌ Error updating database. Check console.";
                }
            });
        });
    </script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background-color: #f0f2f5; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1c1e21; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #4b4f56; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        #statusMsg { margin-top: 20px; font-size: 14px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Update Student Fee</h2>
        <form id="feeUpdateForm">
            <div class="form-group">
                <label for="adNumber">Admission Number</label>
                <input type="text" id="adNumber" placeholder="e.g. 1234" required>
            </div>
            <div class="form-group">
                <label for="amount">New Fee Amount</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" required>
            </div>
            <button type="submit">Update Fee Only</button>
        </form>
        <div id="statusMsg"></div>
    </div>

</body>
</html>
